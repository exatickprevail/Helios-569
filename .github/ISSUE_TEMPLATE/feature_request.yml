name: Feature request
description: Suggest a new feature or improvement for Helios
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an idea. Tell me what you'd like to see and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the use case or limitation you're hitting.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it could work in the card.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about, including workarounds you've tried.
